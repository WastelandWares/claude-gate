name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    timeout-minutes: 30

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Unset to avoid "nested session" error on self-hosted runner
          unset CLAUDECODE

          # Get the diff for this PR (written to file, not shell-interpolated)
          git diff origin/main...HEAD > /tmp/pr-diff.txt

          # Build review prompt (no shell interpolation of diff content)
          cat > /tmp/review-prompt.txt << 'PROMPT'
          You are reviewing a PR for claude-gate, a macOS Swift CLI that gates Claude Code tool calls behind Touch ID authentication. Review the diff provided via stdin for:
          1. Security issues (this is a security tool — correctness is critical)
          2. Swift/AppKit correctness (thread safety, memory, lifecycle)
          3. Hook contract compliance (exit codes, JSON format per Claude Code docs)
          4. Rule pattern correctness (regex escaping, false positives/negatives)
          5. Edge cases in the gate flow (window close during auth, timeout, double output)

          Be specific. Reference file:line. Only flag real issues, not style preferences.

          Here is the diff:
          PROMPT

          # Combine prompt + diff safely, pipe to claude via stdin
          cat /tmp/review-prompt.txt /tmp/pr-diff.txt | claude --print -p - 2>&1 | tee /tmp/claude-review.txt || true

          # Post review as PR comment using --body-file (no shell interpolation)
          {
            echo "## Claude Code Review"
            echo ""
            cat /tmp/claude-review.txt
          } > /tmp/pr-comment.txt
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr-comment.txt
